name: Release on version bump

# When VERSION changes on main (i.e. a release is cut in a merged PR), create the annotated
# tag v<VERSION> and a GitHub Release, using that version's section of docs/CHANGELOG.md as the
# notes. Idempotent: if the tag already exists it does nothing.

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag + release if VERSION is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(head -n1 VERSION | tr -d '[:space:]')"
          tag="v${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "$tag already exists — nothing to do"; exit 0
          fi
          # Build USER-ORIENTED release notes (not the raw dev changelog): lead with this
          # version's changelog summary paragraph, add install/upgrade steps, and fold the
          # technical bullets into a <details>. Extract the section first (## <ver> .. next ##).
          section="$(mktemp)"
          awk -v v="$version" '
            $0 ~ ("^## " v "( |$)") { f = 1; next }
            /^## / { f = 0 }
            f { print }
          ' docs/CHANGELOG.md > "$section"
          summary="$(awk '/^- /{exit} {print}' "$section")"        # human summary, before the bullets
          detail="$(awk 'p||/^- /{p=1;print}' "$section")"          # the technical bullets
          notes_file="$(mktemp)"
          {
            if [ -n "$summary" ]; then printf '%s\n\n' "$summary"; else printf '## %s\n\n' "$tag"; fi
            printf '## Install or upgrade\n\n'
            printf '```bash\n'
            printf 'git clone https://github.com/%s ~/forge-ai\n' "$GITHUB_REPOSITORY"
            printf 'cd /path/to/your-project\n'
            printf '~/forge-ai/install.sh              # first install (--git-init to set up git too)\n'
            printf '~/forge-ai/install.sh --upgrade    # update an existing install\n'
            printf '```\n\n'
            printf 'Runs identically on Claude Code, Codex, and OpenCode.\n\n'
            if [ -n "$detail" ]; then
              printf '<details><summary>Full changelog</summary>\n\n%s\n\n</details>\n' "$detail"
            fi
          } > "$notes_file"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -F "$notes_file"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --notes-file "$notes_file"
          echo "released $tag"
